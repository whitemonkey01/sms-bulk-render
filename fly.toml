# fly.toml app configuration file generated for sms-bulk-render on 2026-07-10T13:03:50Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sms-bulk-render'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
